name: System Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: NixOS system
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Build system
        run: nix build .#nixosConfigurations.nixos.config.system.build.toplevel

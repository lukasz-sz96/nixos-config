add_newline = false
palette = "noctalia"
format = """
$cmd_duration $directory$git_branch
  $character"""

[character]
success_symbol = "[¯®▒ ´üï](bold fg:text)"
error_symbol = "[´Çì ´üï](bold fg:red)"

[cmd_duration]
min_time = 0
format = "[¯éÂ](bold fg:surface2)[¾░¬ó $duration](bold bg:surface2 fg:text)[¯é┤](bold fg:surface2)"

[directory]
home_symbol = "´æ¡ "
read_only = " ´æû "
style = "bg:text fg:base"
truncation_length = 2
truncation_symbol = ".../"
format = "[¯éÂ](bold fg:text)[¾░ëï ÔåÆ $path]($style)[¯é┤](bold fg:text)"

[directory.substitutions]
Desktop = " ´Æ® "
Documents = " ´ÆÑ "
Downloads = " ´Éë "
Music = " ¾░Äê "
Pictures = " ´ÉÅ "
Videos = " ´ö¼ "
GitHub = " ¾░èñ "

[fill]
symbol = "-"
style = "fg:overlay0"

[git_branch]
style = "bg:surface2"
symbol = "¾░ÿ¼"
truncation_length = 12
truncation_symbol = ""
format = " ¾░£Ñ [¯éÂ](bold fg:surface2)[$symbol $branch(:$remote_branch)](fg:text bg:surface2)[¯é┤ ](bold fg:surface2)"

[git_commit]
commit_hash_length = 4
tag_symbol = "´ÆÂ "

[git_state]
format = "[\\($state( $progress_current of $progress_total)\\)]($style) "
cherry_pick = "[PICKING](bold red)"

[git_status]
conflicted = " = "
ahead = " Ôçí "
behind = " Ôçú "
diverged = " Ôçò "
untracked = " ? "
stashed = " * "
modified = " ! "
staged = "[++\\($count\\)](green)"
renamed = " ┬╗ "
deleted = " x "

[hostname]
ssh_only = false
format = "[ÔÇó$hostname](bg:surface2 bold fg:text)[¯é┤](bold fg:surface2)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[package]
disabled = true

[time]
disabled = true
format = "[\\[ $time \\]]($style) "
time_format = "%T"

[username]
style_user = "bold bg:surface2 fg:text"
style_root = "red bold"
format = "[¯éÂ](bold fg:surface2)[$user]($style)"
disabled = false
show_always = true
